<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polar Plaza</title>
    <style>
      :root {
        color-scheme: light;
        --sky: #bfe9ff;
        --sky-deep: #5eb8ee;
        --ice: #dff7ff;
        --snow: #ffffff;
        --ink: #17304a;
        --muted: #57708b;
        --line: #9ed5ee;
        --panel: #ffffff;
        --brand: #1478cf;
        --brand-dark: #075fa8;
        --sun: #ffd66b;
        --good: #18a06f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.9) 0 8%, transparent 9%),
          linear-gradient(180deg, #8ed8ff 0%, #dff8ff 55%, #f7fbff 100%);
        color: var(--ink);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto -10vw 0;
        height: 120px;
        pointer-events: none;
        background: radial-gradient(70% 100% at 50% 100%, #fff 0 62%, transparent 63%);
        z-index: -1;
      }

      body::after {
        height: 180px;
        opacity: 0.55;
        transform: translateY(40px);
      }

      main {
        width: min(1180px, calc(100% - 24px));
        margin: 0 auto;
        padding: 18px 0 22px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
        margin-bottom: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .badge {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(160deg, #fff 0 38%, #9de7ff 39% 100%);
        border: 3px solid #fff;
        box-shadow: 0 12px 24px rgba(22, 76, 117, 0.18);
        font-weight: 950;
        color: var(--brand-dark);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 3.4vw, 3rem);
        line-height: 1;
      }

      .subtitle {
        margin-top: 5px;
        color: #315f82;
        font-weight: 650;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 13px;
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        color: #315f82;
        box-shadow: 0 10px 22px rgba(22, 76, 117, 0.12);
        font-weight: 800;
        white-space: nowrap;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #d92d20;
      }

      .dot.connected {
        background: var(--good);
      }

      .world {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        gap: 14px;
        align-items: stretch;
      }

      .game-shell,
      .side-panel,
      .chat-dock {
        border: 2px solid rgba(255, 255, 255, 0.92);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 18px 45px rgba(14, 70, 112, 0.16);
      }

      .game-shell {
        overflow: hidden;
      }

      .room-tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 7px;
        padding: 10px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(229, 247, 255, 0.86));
        border-bottom: 2px solid rgba(118, 190, 223, 0.55);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 11px;
        background: var(--brand);
        color: white;
        font-weight: 900;
        cursor: pointer;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
      }

      button:hover {
        background: var(--brand-dark);
      }

      button.secondary {
        background: #e8f6ff;
        color: #075fa8;
        border: 1px solid #9ed5ee;
        box-shadow: none;
      }

      button.room-button {
        background: #fff;
        color: #19679f;
        border: 2px solid #9ed5ee;
        box-shadow: none;
      }

      button.room-button.active {
        background: #146ebd;
        color: white;
        border-color: #146ebd;
      }

      .game-stage {
        position: relative;
        aspect-ratio: 16 / 9;
        min-height: 440px;
        overflow: hidden;
        touch-action: none;
        background:
          radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.9) 0 5%, transparent 6%),
          linear-gradient(180deg, var(--room-sky, #98ddff) 0 45%, var(--room-ground, #dff8ff) 46% 100%);
      }

      .game-stage::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 18px;
        width: 76%;
        height: 48%;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 58%, rgba(255, 255, 255, 0.93) 0 34%, transparent 35%),
          radial-gradient(circle at 50% 56%, rgba(118, 211, 244, 0.7) 0 44%, transparent 45%);
        border: 3px solid rgba(255, 255, 255, 0.76);
        opacity: 0.95;
      }

      .game-stage::after {
        content: "";
        position: absolute;
        inset: auto -5% -42px;
        height: 160px;
        border-radius: 50% 50% 0 0;
        background: rgba(255, 255, 255, 0.8);
      }

      .room-town {
        --room-sky: #98ddff;
        --room-ground: #d5f5ff;
      }

      .room-plaza {
        --room-sky: #8bd7ff;
        --room-ground: #e7f8ff;
      }

      .room-dojo {
        --room-sky: #b8ddff;
        --room-ground: #edf7ff;
      }

      .room-cove {
        --room-sky: #78d0ff;
        --room-ground: #c2f0ff;
      }

      .scene-layer,
      .player-layer,
      .effect-layer {
        position: absolute;
        inset: 0;
      }

      .scene-layer {
        z-index: 1;
        pointer-events: none;
      }

      .player-layer {
        z-index: 3;
      }

      .effect-layer {
        z-index: 4;
        pointer-events: none;
      }

      .sun {
        position: absolute;
        top: 26px;
        right: 34px;
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: var(--sun);
        box-shadow: 0 0 0 12px rgba(255, 214, 107, 0.2);
      }

      .cloud {
        position: absolute;
        width: 128px;
        height: 40px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 34px -13px 0 2px rgba(255, 255, 255, 0.86), 68px 1px 0 rgba(255, 255, 255, 0.86);
      }

      .cloud.one {
        left: 7%;
        top: 42px;
      }

      .cloud.two {
        left: 38%;
        top: 24px;
        transform: scale(0.78);
      }

      .building {
        position: absolute;
        border: 4px solid #fff;
        box-shadow: 0 14px 24px rgba(22, 76, 117, 0.16);
      }

      .coffee {
        left: 54px;
        bottom: 168px;
        width: 155px;
        height: 118px;
        border-radius: 8px 8px 20px 20px;
        background: #f8c44d;
      }

      .coffee::before {
        content: "CAFE";
        position: absolute;
        top: 18px;
        left: 24px;
        right: 24px;
        padding: 6px;
        border-radius: 8px;
        background: #19679f;
        color: #fff;
        font-weight: 950;
        text-align: center;
      }

      .shop {
        right: 70px;
        bottom: 162px;
        width: 178px;
        height: 126px;
        border-radius: 22px 22px 10px 10px;
        background: #ff7aa8;
      }

      .shop::before {
        content: "STYLE";
        position: absolute;
        top: 18px;
        left: 28px;
        right: 28px;
        padding: 6px;
        border-radius: 8px;
        background: #fff;
        color: #be2f65;
        font-weight: 950;
        text-align: center;
      }

      .dojo {
        left: 50%;
        bottom: 158px;
        width: 260px;
        height: 132px;
        transform: translateX(-50%);
        border-radius: 8px 8px 18px 18px;
        background: #f4d19b;
      }

      .dojo::before {
        content: "";
        position: absolute;
        left: -22px;
        right: -22px;
        top: -58px;
        height: 70px;
        clip-path: polygon(50% 0, 100% 72%, 86% 100%, 14% 100%, 0 72%);
        background: #b43f2c;
        border: 4px solid #fff;
      }

      .surf {
        left: 46px;
        bottom: 144px;
        width: 184px;
        height: 114px;
        border-radius: 16px 16px 10px 10px;
        background: #62c17f;
      }

      .surf::before {
        content: "SURF";
        position: absolute;
        top: 18px;
        left: 32px;
        right: 32px;
        padding: 6px;
        border-radius: 8px;
        background: #fff;
        color: #197543;
        font-weight: 950;
        text-align: center;
      }

      .tree {
        position: absolute;
        bottom: 142px;
        width: 0;
        height: 0;
        border-left: 36px solid transparent;
        border-right: 36px solid transparent;
        border-bottom: 86px solid #198265;
        filter: drop-shadow(0 14px 10px rgba(22, 76, 117, 0.12));
      }

      .tree::after {
        content: "";
        position: absolute;
        left: -8px;
        top: 78px;
        width: 16px;
        height: 34px;
        background: #9c6a38;
      }

      .tree.a {
        left: 270px;
      }

      .tree.b {
        right: 285px;
        transform: scale(0.82);
      }

      .room-label {
        position: absolute;
        left: 20px;
        bottom: 18px;
        z-index: 2;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        border: 2px solid rgba(118, 190, 223, 0.7);
        color: #19679f;
        font-weight: 950;
      }

      .avatar {
        position: absolute;
        width: 74px;
        height: 92px;
        transform: translate(-50%, -84%);
        transition: left 130ms linear, top 130ms linear;
        filter: drop-shadow(0 14px 10px rgba(10, 56, 94, 0.18));
      }

      .avatar.mine .penguin {
        box-shadow: 0 0 0 5px rgba(255, 214, 107, 0.72);
      }

      .penguin {
        position: absolute;
        left: 9px;
        bottom: 4px;
        width: 56px;
        height: 72px;
        border-radius: 46% 46% 42% 42%;
        background: var(--penguin-color, #1478cf);
        border: 3px solid rgba(9, 64, 106, 0.24);
      }

      .penguin::before {
        content: "";
        position: absolute;
        left: 11px;
        right: 11px;
        bottom: 8px;
        height: 40px;
        border-radius: 48%;
        background: #fff;
      }

      .eye {
        position: absolute;
        top: 17px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #11263a;
        z-index: 2;
      }

      .eye.left {
        left: 18px;
      }

      .eye.right {
        right: 18px;
      }

      .beak {
        position: absolute;
        top: 27px;
        left: 50%;
        width: 18px;
        height: 10px;
        transform: translateX(-50%);
        border-radius: 50% 50% 45% 45%;
        background: #ffb23f;
        z-index: 2;
      }

      .flipper {
        position: absolute;
        top: 30px;
        width: 19px;
        height: 38px;
        border-radius: 999px;
        background: var(--penguin-color, #1478cf);
        border: 3px solid rgba(9, 64, 106, 0.17);
      }

      .flipper.left {
        left: -12px;
        transform: rotate(22deg);
      }

      .flipper.right {
        right: -12px;
        transform: rotate(-22deg);
      }

      .foot {
        position: absolute;
        bottom: -8px;
        width: 25px;
        height: 12px;
        border-radius: 999px;
        background: #ff9f1c;
      }

      .foot.left {
        left: 4px;
      }

      .foot.right {
        right: 4px;
      }

      .name-tag,
      .chat-bubble,
      .emote-burst {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .name-tag {
        bottom: -18px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(118, 190, 223, 0.9);
        font-size: 0.78rem;
        font-weight: 900;
        white-space: nowrap;
        color: #17476e;
      }

      .chat-bubble {
        bottom: 92px;
        min-width: 74px;
        max-width: 190px;
        padding: 7px 9px;
        border-radius: 14px;
        background: #fff;
        border: 2px solid #91cdea;
        color: #17304a;
        font-size: 0.86rem;
        font-weight: 750;
        opacity: 0;
        pointer-events: none;
        box-shadow: 0 12px 20px rgba(22, 76, 117, 0.12);
      }

      .chat-bubble.show {
        opacity: 1;
      }

      .emote-burst {
        bottom: 92px;
        padding: 5px 8px;
        border-radius: 999px;
        background: #ffd66b;
        color: #6d4200;
        border: 2px solid #fff;
        font-weight: 950;
        opacity: 0;
        animation: none;
      }

      .emote-burst.show {
        animation: pop 1.25s ease-out forwards;
      }

      .avatar.dancing .penguin {
        animation: dance 0.52s ease-in-out 4;
      }

      .avatar.waving .flipper.right {
        animation: wave 0.45s ease-in-out 4;
        transform-origin: 6px 8px;
      }

      .snowball {
        position: absolute;
        left: 0;
        top: 0;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid #cbeeff;
        box-shadow: 0 8px 12px rgba(22, 76, 117, 0.18);
        transform: translate(var(--from-x), var(--from-y)) scale(0.75);
        transition: transform 520ms cubic-bezier(0.12, 0.78, 0.28, 1);
      }

      .snowball.fly {
        transform: translate(var(--to-x), var(--to-y)) scale(1.08);
      }

      .splash {
        position: absolute;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.95);
        transform: translate(-50%, -50%) scale(0.25);
        opacity: 0.9;
        animation: splash 480ms ease-out forwards;
      }

      .side-panel {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 13px;
      }

      .panel-title {
        font-size: 1.1rem;
        font-weight: 950;
        color: #17476e;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 0.84rem;
        font-weight: 900;
        color: #315f82;
      }

      input {
        width: 100%;
        border: 2px solid #9ed5ee;
        border-radius: 8px;
        padding: 10px 11px;
        background: #fff;
        color: var(--ink);
      }

      .color-row {
        display: grid;
        grid-template-columns: 1fr 54px;
        gap: 8px;
      }

      input[type="color"] {
        height: 44px;
        padding: 4px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .actions button {
        padding: 9px 6px;
      }

      .player-list {
        display: grid;
        gap: 8px;
        max-height: 180px;
        overflow: auto;
      }

      .player-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 9px;
        border-radius: 8px;
        background: #f4fbff;
        border: 1px solid #b7e1f4;
        font-weight: 850;
      }

      .swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 7px;
        border-radius: 50%;
        vertical-align: -1px;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px #9ed5ee;
      }

      .score-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 30px;
        padding: 3px 7px;
        border-radius: 999px;
        background: #fff;
        color: #19679f;
        border: 1px solid #9ed5ee;
      }

      .log {
        height: 150px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding: 9px;
        border: 1px solid #b7e1f4;
        border-radius: 8px;
        background: #f8fdff;
        font-size: 0.9rem;
      }

      .log p {
        color: #4d6b82;
      }

      .chat-dock {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        padding: 10px;
      }

      .hint {
        color: #4d6b82;
        font-size: 0.9rem;
        line-height: 1.35;
      }

      @keyframes pop {
        0% {
          opacity: 0;
          transform: translateX(-50%) translateY(12px) scale(0.7);
        }

        18%,
        78% {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }

        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-24px) scale(0.9);
        }
      }

      @keyframes dance {
        0%,
        100% {
          transform: rotate(0deg) translateY(0);
        }

        25% {
          transform: rotate(-8deg) translateY(-5px);
        }

        75% {
          transform: rotate(8deg) translateY(-5px);
        }
      }

      @keyframes wave {
        0%,
        100% {
          transform: rotate(-22deg);
        }

        50% {
          transform: rotate(-92deg);
        }
      }

      @keyframes splash {
        to {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.25);
        }
      }

      @media (max-width: 940px) {
        .world {
          grid-template-columns: 1fr;
        }

        .side-panel {
          order: 2;
        }

        .game-stage {
          min-height: 360px;
        }
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 14px, 1180px);
          padding-top: 10px;
        }

        .topbar,
        .chat-dock {
          grid-template-columns: 1fr;
        }

        .room-tabs {
          grid-template-columns: repeat(2, 1fr);
        }

        .game-stage {
          min-height: 330px;
        }

        .coffee,
        .shop,
        .surf,
        .dojo {
          transform: scale(0.72);
          transform-origin: bottom center;
        }

        .dojo {
          transform: translateX(-50%) scale(0.72);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">
          <div class="badge">PP</div>
          <div>
            <h1>Polar Plaza</h1>
            <p class="subtitle">A tiny snowy multiplayer hangout for browser testing.</p>
          </div>
        </div>
        <div class="status" aria-live="polite">
          <span class="dot" id="connectionDot"></span>
          <span id="connectionText">Connecting</span>
        </div>
      </header>

      <section class="world">
        <div class="game-shell">
          <nav class="room-tabs" id="roomTabs" aria-label="Rooms"></nav>
          <div class="game-stage room-town" id="stage" aria-label="Polar Plaza play area">
            <div class="scene-layer" id="sceneLayer"></div>
            <div class="player-layer" id="playerLayer"></div>
            <div class="effect-layer" id="effectLayer"></div>
            <div class="room-label" id="roomLabel">Town</div>
          </div>
        </div>

        <aside class="side-panel">
          <form id="joinForm">
            <div class="field">
              <label for="name">Penguin name</label>
              <input id="name" maxlength="18" autocomplete="nickname" />
            </div>
            <div class="field">
              <label for="room">Private room code</label>
              <div class="color-row">
                <input id="room" maxlength="24" />
                <input id="color" type="color" aria-label="Penguin color" />
              </div>
            </div>
            <button type="submit">Enter island</button>
          </form>

          <div>
            <div class="panel-title">Quick Actions</div>
            <div class="actions">
              <button id="waveButton" type="button">Wave</button>
              <button id="danceButton" type="button">Dance</button>
              <button id="snowballButton" type="button">Snowball</button>
            </div>
          </div>

          <p class="hint">Click or tap the snow to waddle around. Use arrow keys or WASD too. Snowball adds a test point.</p>

          <div>
            <div class="panel-title">Penguins Online</div>
            <div class="player-list" id="playerList"></div>
          </div>

          <div>
            <div class="panel-title">Island Log</div>
            <div class="log" id="log"></div>
          </div>

          <button class="secondary" id="copyLink" type="button">Copy room link</button>
        </aside>

        <form class="chat-dock" id="chatForm">
          <input id="chatText" maxlength="120" placeholder="Say something friendly" />
          <button type="submit">Chat</button>
          <button class="secondary" id="quickHello" type="button">Quick hello</button>
        </form>
      </section>
    </main>

    <script>
      const stage = document.querySelector("#stage");
      const sceneLayer = document.querySelector("#sceneLayer");
      const playerLayer = document.querySelector("#playerLayer");
      const effectLayer = document.querySelector("#effectLayer");
      const playerList = document.querySelector("#playerList");
      const roomTabs = document.querySelector("#roomTabs");
      const roomLabel = document.querySelector("#roomLabel");
      const log = document.querySelector("#log");
      const connectionDot = document.querySelector("#connectionDot");
      const connectionText = document.querySelector("#connectionText");
      const joinForm = document.querySelector("#joinForm");
      const chatForm = document.querySelector("#chatForm");
      const nameInput = document.querySelector("#name");
      const roomInput = document.querySelector("#room");
      const colorInput = document.querySelector("#color");
      const copyLink = document.querySelector("#copyLink");
      const chatText = document.querySelector("#chatText");
      const quickHello = document.querySelector("#quickHello");
      const waveButton = document.querySelector("#waveButton");
      const danceButton = document.querySelector("#danceButton");
      const snowballButton = document.querySelector("#snowballButton");

      const params = new URLSearchParams(location.search);
      const colors = ["#1478cf", "#d9468f", "#15a36e", "#ef7d22", "#7c3aed", "#111827"];
      const rooms = [
        { id: "town", label: "Town", code: "town", scenery: ["coffee", "shop", "tree a", "tree b"] },
        { id: "plaza", label: "Plaza", code: "plaza", scenery: ["shop", "coffee", "tree a"] },
        { id: "dojo", label: "Dojo", code: "dojo", scenery: ["dojo", "tree a", "tree b"] },
        { id: "cove", label: "Cove", code: "cove", scenery: ["surf", "tree a"] }
      ];

      let socket;
      let playerId = null;
      let currentArea = params.get("area") || "town";
      let privateCode = params.get("room") || "public";
      let players = [];
      let nextSnowballTarget = null;
      const bubbleTimers = new Map();

      const me = {
        name: `Penguin ${Math.floor(100 + Math.random() * 900)}`,
        color: colors[Math.floor(Math.random() * colors.length)]
      };

      nameInput.value = me.name;
      roomInput.value = privateCode;
      colorInput.value = me.color;

      function fullRoomCode(area = currentArea) {
        return `${roomInput.value.trim() || "public"}:${area}`;
      }

      function connect() {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        socket = new WebSocket(`${protocol}://${location.host}`);

        socket.addEventListener("open", () => {
          setConnection(true);
          joinRoom();
        });

        socket.addEventListener("close", () => {
          setConnection(false);
          addLog("Connection paused. Trying again...");
          setTimeout(connect, 900);
        });

        socket.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);

          if (message.type === "welcome") {
            playerId = message.id;
            updateRoomUrl();
          }

          if (message.type === "state") {
            players = message.players;
            renderPlayers();
            renderPlayerList();
          }

          if (message.type === "chat") {
            addLog(`${message.name}: ${message.text}`);
            showBubble(message.playerId, message.text);
          }

          if (message.type === "emote") {
            showEmote(message.playerId, message.emote);
            addLog(`${message.name} used ${message.emote}`);
          }

          if (message.type === "snowball") {
            animateSnowball(message);
            addLog(`${message.name} threw a snowball`);
          }
        });
      }

      function setConnection(isConnected) {
        connectionDot.classList.toggle("connected", isConnected);
        connectionText.textContent = isConnected ? "Online" : "Reconnecting";
      }

      function send(message) {
        if (socket?.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(message));
        }
      }

      function joinRoom() {
        me.name = nameInput.value.trim() || "Penguin";
        me.color = colorInput.value;
        privateCode = roomInput.value.trim() || "public";
        const spawn = spawnPointFor(currentArea);
        players = [];
        renderPlayers();
        send({
          type: "join",
          name: me.name,
          color: me.color,
          room: fullRoomCode(),
          x: spawn.x,
          y: spawn.y
        });
        updateRoomUrl();
        addLog(`Entered ${getRoom(currentArea).label}`);
      }

      function getRoom(area) {
        return rooms.find((room) => room.id === area) || rooms[0];
      }

      function spawnPointFor(area) {
        const seeds = {
          town: { x: 250, y: 345 },
          plaza: { x: 560, y: 335 },
          dojo: { x: 405, y: 360 },
          cove: { x: 330, y: 350 }
        };
        return seeds[area] || seeds.town;
      }

      function renderRoomTabs() {
        roomTabs.innerHTML = "";
        for (const room of rooms) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `room-button ${room.id === currentArea ? "active" : ""}`;
          button.textContent = room.label;
          button.addEventListener("click", () => switchArea(room.id));
          roomTabs.appendChild(button);
        }
      }

      function renderScene() {
        const room = getRoom(currentArea);
        stage.className = `game-stage room-${room.id}`;
        roomLabel.textContent = room.label;
        sceneLayer.innerHTML = `
          <div class="sun"></div>
          <div class="cloud one"></div>
          <div class="cloud two"></div>
          ${room.scenery.map((item) => `<div class="${item.includes("tree") ? "tree" : "building"} ${item}"></div>`).join("")}
        `;
        renderRoomTabs();
      }

      function switchArea(area) {
        if (area === currentArea) return;
        currentArea = area;
        renderScene();
        joinRoom();
      }

      function renderPlayers() {
        const existing = new Set();
        for (const player of players) {
          existing.add(player.id);
          let el = playerLayer.querySelector(`[data-player-id="${player.id}"]`);
          if (!el) {
            el = document.createElement("div");
            el.className = "avatar";
            el.dataset.playerId = player.id;
            el.innerHTML = `
              <div class="chat-bubble"></div>
              <div class="emote-burst"></div>
              <div class="penguin">
                <span class="flipper left"></span>
                <span class="flipper right"></span>
                <span class="eye left"></span>
                <span class="eye right"></span>
                <span class="beak"></span>
                <span class="foot left"></span>
                <span class="foot right"></span>
              </div>
              <div class="name-tag"></div>
            `;
            playerLayer.appendChild(el);
          }

          el.classList.toggle("mine", player.id === playerId);
          el.style.left = `${(player.x / 800) * 100}%`;
          el.style.top = `${(player.y / 460) * 100}%`;
          el.style.zIndex = Math.round(player.y);
          el.querySelector(".penguin").style.setProperty("--penguin-color", player.color);
          el.querySelector(".name-tag").textContent = player.name;
        }

        for (const el of playerLayer.querySelectorAll(".avatar")) {
          if (!existing.has(el.dataset.playerId)) {
            el.remove();
          }
        }
      }

      function renderPlayerList() {
        playerList.innerHTML = "";
        for (const player of [...players].sort((a, b) => b.score - a.score)) {
          const row = document.createElement("div");
          row.className = "player-row";
          row.innerHTML = `
            <span><span class="swatch" style="background:${player.color}"></span>${escapeHtml(player.name)}</span>
            <span class="score-pill">${player.score}</span>
          `;
          playerList.appendChild(row);
        }
      }

      function moveMine(dx, dy) {
        const player = players.find((item) => item.id === playerId);
        if (!player) return;
        send({ type: "move", x: player.x + dx, y: player.y + dy });
      }

      function moveToPoint(clientX, clientY) {
        const rect = stage.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * 800;
        const y = ((clientY - rect.top) / rect.height) * 460;
        send({ type: "move", x, y });
      }

      function showBubble(id, text) {
        const el = playerLayer.querySelector(`[data-player-id="${id}"]`);
        if (!el) return;

        const bubble = el.querySelector(".chat-bubble");
        bubble.textContent = text;
        bubble.classList.add("show");
        clearTimeout(bubbleTimers.get(id));
        bubbleTimers.set(id, setTimeout(() => bubble.classList.remove("show"), 3600));
      }

      function showEmote(id, emote) {
        const el = playerLayer.querySelector(`[data-player-id="${id}"]`);
        if (!el) return;

        const label = emote === "dance" ? "DANCE" : emote === "hello" ? "HELLO" : "WAVE";
        const burst = el.querySelector(".emote-burst");
        burst.textContent = label;
        burst.classList.remove("show");
        el.classList.remove("dancing", "waving");
        void burst.offsetWidth;
        burst.classList.add("show");
        el.classList.add(emote === "dance" ? "dancing" : "waving");
        setTimeout(() => el.classList.remove("dancing", "waving"), 1800);
      }

      function throwSnowball(target) {
        const player = players.find((item) => item.id === playerId);
        if (!player) return;
        const fallback = { x: player.x + 95, y: player.y - 65 };
        send({
          type: "snowball",
          targetX: target?.x || fallback.x,
          targetY: target?.y || fallback.y
        });
      }

      function animateSnowball(message) {
        const snowball = document.createElement("div");
        snowball.className = "snowball";
        snowball.style.setProperty("--from-x", `${message.x}px`);
        snowball.style.setProperty("--from-y", `${message.y - 62}px`);
        snowball.style.setProperty("--to-x", `${message.targetX}px`);
        snowball.style.setProperty("--to-y", `${message.targetY}px`);
        effectLayer.appendChild(snowball);

        requestAnimationFrame(() => snowball.classList.add("fly"));
        setTimeout(() => {
          snowball.remove();
          const splash = document.createElement("div");
          splash.className = "splash";
          splash.style.left = `${(message.targetX / 800) * 100}%`;
          splash.style.top = `${(message.targetY / 460) * 100}%`;
          effectLayer.appendChild(splash);
          setTimeout(() => splash.remove(), 520);
        }, 540);
      }

      function addLog(text) {
        const p = document.createElement("p");
        p.textContent = text;
        log.appendChild(p);
        log.scrollTop = log.scrollHeight;
      }

      function updateRoomUrl() {
        const url = new URL(location.href);
        url.searchParams.set("room", privateCode);
        url.searchParams.set("area", currentArea);
        history.replaceState(null, "", url);
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      joinForm.addEventListener("submit", (event) => {
        event.preventDefault();
        joinRoom();
      });

      copyLink.addEventListener("click", async () => {
        updateRoomUrl();
        await navigator.clipboard.writeText(location.href);
        addLog("Room link copied");
      });

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = chatText.value.trim();
        if (!text) return;
        send({ type: "chat", text });
        chatText.value = "";
      });

      quickHello.addEventListener("click", () => {
        send({ type: "chat", text: "Hi from the plaza!" });
      });

      waveButton.addEventListener("click", () => send({ type: "emote", emote: "wave" }));
      danceButton.addEventListener("click", () => send({ type: "emote", emote: "dance" }));
      snowballButton.addEventListener("click", () => throwSnowball(nextSnowballTarget));

      stage.addEventListener("pointerdown", (event) => {
        const rect = stage.getBoundingClientRect();
        nextSnowballTarget = {
          x: ((event.clientX - rect.left) / rect.width) * 800,
          y: ((event.clientY - rect.top) / rect.height) * 460
        };
        moveToPoint(event.clientX, event.clientY);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        const step = event.shiftKey ? 36 : 18;
        if (["arrowup", "w"].includes(key)) moveMine(0, -step);
        if (["arrowdown", "s"].includes(key)) moveMine(0, step);
        if (["arrowleft", "a"].includes(key)) moveMine(-step, 0);
        if (["arrowright", "d"].includes(key)) moveMine(step, 0);
        if (key === " ") {
          event.preventDefault();
          throwSnowball(nextSnowballTarget);
        }
      });

      renderScene();
      connect();
    </script>
  </body>
</html>
